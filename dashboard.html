<!DOCTYPE html>
<html>

<head>
    <title>Demand Forecast Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <h2>Demand Forecast Dashboard</h2>

    <canvas id="chart"></canvas>

    <script>
        fetch('data/forecast_output.csv')
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').slice(1);

                const labels = [];
                const actual = [];
                const forecast = [];

                rows.forEach(row => {
                    const cols = row.split(',');

                    if (cols.length > 5) {
                        labels.push(cols[0]);
                        actual.push(parseFloat(cols[3]));
                        forecast.push(parseFloat(cols[cols.length - 1]));
                    }
                });

                new Chart(document.getElementById('chart'), {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Actual', data: actual },
                            { label: 'Forecast', data: forecast }
                        ]
                    }
                });
            });
    </script>

</body>

</html>
